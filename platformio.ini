[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
lib_deps = 
	rstephan/ArtnetWifi@^1.6.2
	someweisguy/esp_dmx@^4.1.0
	arduino-libraries/Ethernet@^2.0.2